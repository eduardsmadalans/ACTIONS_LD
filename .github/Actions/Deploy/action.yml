name: 'Build/Deploy'
description: 'Deploy'
inputs:
  enviroment:
    required: true
  port:
    required: true
runs:
  using: composite
  steps:
    - uses: actions/checkout@v6
      with:
        repository: 'mtararujs/python-greetings'
        path: 'depl'
    - name: test install
      working-directory: ./depl
      run: npm install -g pm2
      shell: powershell
    - name: Delete
      working-directory: ./depl
      run: pm2 delete greetings-app-${{ inputs.enviroment }} & EXIT /B 0
      shell: powershell
    - name: Start
      working-directory: ./depl
      run: pm2 start -n greetings-app-${{ inputs.enviroment }} app.py -- -- ${{ inputs.port }}
      shell: powershell
