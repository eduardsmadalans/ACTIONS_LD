name: 'Build/Test'
description: 'Test'
inputs:
  enviroment:
    required: true
runs:
  using: composite
  steps:
    - uses: actions/checkout@v6
      with:
        repository: 'mtararujs/course-js-api-framework'
        path: 'to'
    - name: test install
      working-directory: ./to
      run: npm install
      shell: pwsh

    - name: greetings
      working-directory: ./to
      run: npm run greetings greetings_${{ inputs.enviroment }}
      shell: pwsh
