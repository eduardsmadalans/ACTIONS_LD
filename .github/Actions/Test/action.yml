name: 'Test'
description: 'Testing'
inputs:
  enviroment:
    required: true
runs:
  using: composite
  steps:
    - uses: actions/checkout@v6
      with:
        repository: 'mtararujs/course-js-api-framework'
        clean: 'false'
        path: 'to'

    - run: echo "Installing test dependency"
      shell: bash
    - name: test Dependency
      working-directory: ./to
      run: npm install
      shell: bash
      
    - run: echo "Access to API"
      shell: bash
    - name: greetings
      working-directory: ./to
      run: npm run greetings greetings_${{ inputs.enviroment }}
      shell: bash
